name: Send MFI Table to Slack

on:
  schedule:
    - cron: '*/30 3-13 * * 1-6'  # Every 30 min, 3:00–13:30 UTC = 8:30AM–7:00PM IST (Mon–Sat)
  workflow_dispatch:              # Allow manual trigger from GitHub UI
  repository_dispatch:           # Allow external trigger (cron-job.org)
    types: [trigger]

jobs:
  send-table:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          WEBHOOK_MY_DM: ${{ secrets.WEBHOOK_MY_DM }}
          WEBHOOK_CHANNEL: ${{ secrets.WEBHOOK_CHANNEL }}
        run: python main.py
