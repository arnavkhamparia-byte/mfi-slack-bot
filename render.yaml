services:
  - type: cron
    name: mfi-slack-table
    runtime: python
    schedule: "*/30 3-13 * * 1-6"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_CHANNEL_ID
        sync: false
